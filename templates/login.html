<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PhishLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #16213e 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">🎣 PhishLab Login</h2>
                    
                    <div id="error-message"></div>
                    
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    
                    <hr>
                    <p class="text-center mb-0">
                        Don't have an account? <a href="/register">Register here</a>
                    </p>
                    <p class="text-center mt-3">
                        <a href="/">Back to Home</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ensure DOM is fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('login-form');
            const errorContainer = document.getElementById('error-message');
            
            if (!loginForm) {
                console.error('Login form not found');
                return;
            }
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                
                // Validate inputs
                if (!username || !password) {
                    errorContainer.innerHTML = 
                        '<div class="alert alert-warning">Please enter username and password</div>';
                    return;
                }
                
                // Disable submit button during request
                const submitBtn = loginForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Logging in...';
                
                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({username, password})
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // Clear error and redirect
                        errorContainer.innerHTML = '';
                        window.location.href = data.redirect;
                    } else {
                        errorContainer.innerHTML = 
                            `<div class="alert alert-danger" role="alert">
                                <strong>Login Failed!</strong><br>
                                ${data.error || 'Invalid credentials'}
                            </div>`;
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Login';
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    errorContainer.innerHTML = 
                        `<div class="alert alert-danger" role="alert">
                            <strong>Error!</strong><br>
                            Unable to connect to server. Please try again.
                        </div>`;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Login';
                }
            });
        });
    </script>
</body>
</html>

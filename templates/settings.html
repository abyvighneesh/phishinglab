<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - PhishLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><strong>🎣 PhishLab</strong></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">⚙️ Settings</h1>

        <div class="row">
            <div class="col-md-6">
                <!-- Profile Information -->
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">👤 Profile Information</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Username:</strong> {{ user.username }}</p>
                        <p><strong>Email:</strong> {{ user.email }}</p>
                        <p><strong>Member Since:</strong> {{ user.created_at.strftime('%B %d, %Y') }}</p>
                    </div>
                </div>

                <!-- Theme Settings -->
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">🎨 Appearance</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="theme" id="light-mode" value="light" checked>
                            <label class="form-check-label" for="light-mode">Light Mode</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="theme" id="dark-mode" value="dark">
                            <label class="form-check-label" for="dark-mode">Dark Mode</label>
                        </div>
                        <button class="btn btn-success" onclick="updateTheme()">Save Theme</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <!-- Account Actions -->
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">⚠️ Account Actions</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Manage your account security and preferences.</p>
                        <button class="btn btn-outline-warning w-100 mb-3">Change Password</button>
                        <button class="btn btn-outline-danger w-100" onclick="logout()">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function updateTheme() {
            const theme = document.querySelector('input[name="theme"]:checked').value;
            try {
                const response = await fetch('/api/settings/theme', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({theme})
                });
                if (response.ok) {
                    alert('Theme updated!');
                }
            } catch (error) {
                alert('Error updating theme');
            }
        }
        
        function logout() {
            if (confirm('Are you sure you want to delete your account?')) {
                window.location.href = '/logout';
            }
        }
    </script>
</body>
</html>
